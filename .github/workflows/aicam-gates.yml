# AICAM Quality Gates — CI Pipeline
#
# Triggered on PR to main/develop and on push/manual dispatch.
# All gates defined in .claude/gates/ are executed here with
# automated tooling — not just AI manual review.
#
# Ecosystem auto-detection: preflight job detects project type,
# downstream jobs use conditional steps based on detected ecosystem.
# No manual adaptation needed for new projects.

name: AICAM Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      run-full-suite:
        description: "Run full test suite (including Smoke Test)"
        type: boolean
        default: true

jobs:
  # ── Gate: Pre-flight Checks ──────────────────────────────────
  preflight:
    name: "Pre-flight: Spec-Lite + CLAUDE.md Health"
    runs-on: ubuntu-latest
    outputs:
      ecosystem: ${{ steps.detect.outputs.ecosystem }}
      project_type: ${{ steps.detect.outputs.project_type }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Spec-Lite existence
        run: |
          PLAN_COUNT=$(find .agents/plans -maxdepth 1 -name "*.md" ! -name "*.summary.md" 2>/dev/null | wc -l)
          SPEC_COUNT=$(find .agents/specs -name "*.spec.md" 2>/dev/null | wc -l)
          if [ "$PLAN_COUNT" -gt "$SPEC_COUNT" ]; then
            echo "::warning::Plan files ($PLAN_COUNT) > Spec-Lite files ($SPEC_COUNT)"
            echo "Each plan must have a corresponding Spec-Lite. Run /plan-feature to generate."
          fi

      - name: Check CLAUDE.md size
        run: |
          if [ -f CLAUDE.md ]; then
            LINES=$(wc -l < CLAUDE.md | tr -d ' ')
            if [ "$LINES" -gt 150 ]; then
              echo "::warning::CLAUDE.md is $LINES lines (> 150 threshold). Run /close-phase to compress."
            fi
          fi

      - name: Detect project ecosystem and type
        id: detect
        run: |
          ECOSYSTEM="none"
          PROJECT_TYPE="none"

          if [ -f "package.json" ]; then
            ECOSYSTEM="npm"
            if [ -f "src-tauri/Cargo.toml" ]; then
              PROJECT_TYPE="tauri"
            elif grep -qE '"react|"next|"vue|"svelte|"angular' package.json 2>/dev/null; then
              PROJECT_TYPE="web"
            else
              PROJECT_TYPE="web"
            fi
          elif [ -f "Cargo.toml" ]; then
            ECOSYSTEM="cargo"
            if grep -q 'clap\|structopt' Cargo.toml 2>/dev/null; then
              PROJECT_TYPE="cli"
            elif grep -q 'actix-web\|axum\|rocket\|warp\|tide' Cargo.toml 2>/dev/null; then
              PROJECT_TYPE="rest-api"
            elif grep -q 'tokio-cron\|celery\|rabbitmq' Cargo.toml 2>/dev/null; then
              PROJECT_TYPE="worker"
            else
              PROJECT_TYPE="cli"
            fi
          elif [ -f "pyproject.toml" ] || [ -f "requirements.txt" ]; then
            ECOSYSTEM="python"
            if grep -qE 'fastapi|flask|django|aiohttp' pyproject.toml requirements.txt 2>/dev/null; then
              PROJECT_TYPE="rest-api"
            elif grep -qE 'celery|rq|huey|dramatiq' pyproject.toml requirements.txt 2>/dev/null; then
              PROJECT_TYPE="worker"
            else
              PROJECT_TYPE="rest-api"
            fi
          elif [ -f "go.mod" ]; then
            ECOSYSTEM="go"
            if grep -qE 'gin|echo|fiber|chi|mux' go.mod 2>/dev/null; then
              PROJECT_TYPE="rest-api"
            else
              PROJECT_TYPE="cli"
            fi
          fi

          echo "ecosystem=${ECOSYSTEM}" >> $GITHUB_OUTPUT
          echo "project_type=${PROJECT_TYPE}" >> $GITHUB_OUTPUT
          echo "Detected ecosystem=${ECOSYSTEM}, project_type=${PROJECT_TYPE}"

  # ── Gate: Security — Secrets Detection ───────────────────────
  secrets-scan:
    name: "Security: Secrets Detection (gitleaks)"
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: .gitleaks.toml

  # ── Gate: Security — SAST ────────────────────────────────────
  sast-scan:
    name: "Security: SAST (semgrep)"
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - name: Run semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
          error: true
        continue-on-error: true

  # ── Gate: Security — Dependency Audit (eco-adaptive) ─────────
  dependency-audit:
    name: "Security: Dependency Audit"
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.ecosystem != 'none'
    steps:
      - uses: actions/checkout@v4

      - name: npm audit
        if: needs.preflight.outputs.ecosystem == 'npm'
        run: npm audit --audit-level=high || echo "::warning::npm audit found vulnerabilities"

      - name: cargo audit
        if: needs.preflight.outputs.ecosystem == 'cargo'
        run: |
          cargo install cargo-audit 2>/dev/null || true
          cargo audit || echo "::warning::cargo audit found vulnerabilities"

      - name: pip audit
        if: needs.preflight.outputs.ecosystem == 'python'
        run: |
          pip install pip-audit 2>/dev/null || true
          pip-audit || echo "::warning::pip-audit found vulnerabilities"

      - name: govulncheck
        if: needs.preflight.outputs.ecosystem == 'go'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest 2>/dev/null || true
          govulncheck ./... || echo "::warning::govulncheck found vulnerabilities"

  # ── Gate: Unit Tests + Coverage (eco-adaptive) ───────────────
  unit-tests:
    name: "Tests: Unit + Coverage"
    runs-on: ubuntu-latest
    needs: [preflight, secrets-scan, sast-scan, dependency-audit]
    if: needs.preflight.outputs.ecosystem != 'none'
    steps:
      - uses: actions/checkout@v4

      - name: npm test + coverage
        if: needs.preflight.outputs.ecosystem == 'npm'
        run: |
          npm ci
          npx vitest run --coverage 2>/dev/null || npx jest --coverage 2>/dev/null || npm test

      - name: cargo test
        if: needs.preflight.outputs.ecosystem == 'cargo'
        run: cargo test --all

      - name: pytest + coverage
        if: needs.preflight.outputs.ecosystem == 'python'
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install pytest pytest-cov
          pytest --cov --cov-report=term-missing

      - name: go test + coverage
        if: needs.preflight.outputs.ecosystem == 'go'
        run: go test ./... -cover -coverprofile=coverage.out

      # Breaking Change detection (v1.3.1)
      - name: API Breaking Change Check
        if: hashFiles('.agents/specs/openapi-current.yaml') != ''
        run: |
          PREV_SPEC=$(ls archive/openapi-phase-*.yaml 2>/dev/null | tail -1)
          if [ -n "$PREV_SPEC" ]; then
            if command -v oasdiff &> /dev/null; then
              oasdiff breaking "$PREV_SPEC" .agents/specs/openapi-current.yaml ||
                echo "::warning::Breaking changes detected — review before merge"
            else
              echo "::warning::oasdiff not installed — skipping automated breaking change check"
              echo "  Install: go install github.com/tufin/oasdiff@latest"
            fi
          else
            echo "No previous spec archived — skipping diff (first Phase is exempt)"
          fi

  # ── Gate: Smoke Test (eco-adaptive) ──────────────────────────
  smoke-test:
    name: "Smoke Test"
    runs-on: ubuntu-latest
    needs: [preflight, unit-tests]
    if: |
      needs.preflight.outputs.ecosystem != 'none' &&
      (github.event_name == 'push' || github.event.inputs.run-full-suite == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test (web/tauri)
        if: |
          needs.preflight.outputs.project_type == 'web' ||
          needs.preflight.outputs.project_type == 'tauri'
        run: |
          npx playwright install chromium 2>/dev/null || true
          npx playwright test --project=chromium 2>/dev/null || echo "::warning::Smoke test needs Playwright config"

      - name: Smoke test (rest-api)
        if: needs.preflight.outputs.project_type == 'rest-api'
        env:
          ECOSYSTEM: ${{ needs.preflight.outputs.ecosystem }}
          PORT: "3000"
        run: |
          echo "Starting API server (ecosystem: $ECOSYSTEM)..."
          case "$ECOSYSTEM" in
            npm)    npm run start & SERVER_PID=$! ;;
            python) if python -c "import uvicorn" 2>/dev/null; then
                      python -m uvicorn main:app --host 0.0.0.0 --port ${PORT} & SERVER_PID=$!
                    else
                      python app.py & SERVER_PID=$!
                    fi ;;
            go)     go run ./... & SERVER_PID=$! ;;
            cargo)  cargo run & SERVER_PID=$! ;;
            *)      echo "::warning::Unknown ecosystem $ECOSYSTEM — cannot start server"; exit 0 ;;
          esac
          npx wait-on "http://localhost:${PORT}/health" --timeout 30000 2>/dev/null || {
            for path in /health /api/health /ping; do
              curl -sf "http://localhost:${PORT}${path}" 2>/dev/null && break
            done || echo "::warning::Health endpoint not reachable"
          }
          curl -sf "http://localhost:${PORT}/health" || echo "::warning::Health check failed"
          kill $SERVER_PID 2>/dev/null
          echo "::notice::rest-api smoke test completed"

      - name: Smoke test (cli)
        if: needs.preflight.outputs.project_type == 'cli'
        run: |
          echo "Running CLI smoke checks..."
          # Build binary and verify it starts
          BIN_PATH=""
          if [ -f "./target/release/$(basename $PWD)" ]; then
            BIN_PATH="./target/release/$(basename $PWD)"
          elif [ -f "./target/debug/$(basename $PWD)" ]; then
            BIN_PATH="./target/debug/$(basename $PWD)"
          fi
          if [ -n "$BIN_PATH" ]; then
            $BIN_PATH --help || echo "::warning::CLI --help failed"
            $BIN_PATH --version 2>/dev/null || true
          else
            echo "::warning::Binary not found — build first, then configure binary path"
          fi

      - name: Smoke test (worker)
        if: needs.preflight.outputs.project_type == 'worker'
        run: |
          echo "::warning::Worker smoke tests are project-specific"
          echo "  Typical pattern: start worker → inject test message → verify log output → stop worker"
          echo "  Configure the start/inject/verify/stop sequence for this project"

      - name: Smoke test (mobile)
        if: needs.preflight.outputs.project_type == 'mobile'
        run: |
          echo "::warning::Mobile smoke tests require device/emulator — not available in standard CI"
          echo "  Recommended: add Detox/Maestro scripts or run on dedicated mobile CI (Bitrise/BrowserStack)"

  # ── Gate: Commit Lint ────────────────────────────────────────
  commit-lint:
    name: "Conventional Commits Check"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yaml

  # ── Final Gate Summary ───────────────────────────────────────
  gate-summary:
    name: "Gate Summary"
    runs-on: ubuntu-latest
    needs: [preflight, secrets-scan, sast-scan, dependency-audit, unit-tests, smoke-test]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## AICAM Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-flight | $([ "${{ needs.preflight.result }}" = "success" ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets | $([ "${{ needs.secrets-scan.result }}" = "success" ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | $([ "${{ needs.sast-scan.result }}" = "success" ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependencies | $([ "${{ needs.dependency-audit.result }}" = "success" ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | $([ "${{ needs.unit-tests.result }}" = "success" ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test | $([ "${{ needs.smoke-test.result }}" = "success" ] && echo '✅' || echo '❌') |" >> $GITHUB_STEP_SUMMARY
